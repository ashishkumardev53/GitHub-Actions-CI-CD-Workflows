<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Zero To Hero</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#050816;
      font-family:system-ui;
      color:white;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:#00f7ff;
      filter:blur(140px);
      top:-120px;
      left:-100px;
      opacity:.25;
    }

    body::after{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:#ff00aa;
      filter:blur(140px);
      bottom:-120px;
      right:-100px;
      opacity:.25;
    }

    .container{
      position:relative;
      z-index:1;
      width:90%;
      max-width:750px;
      text-align:center;
      padding:2.5rem;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border-radius:24px;
      box-shadow:0 0 40px rgba(0,0,0,.4);
    }

    h1{
      font-size:3.2rem;
      margin-bottom:12px;
      color:#fff;
      text-shadow:0 0 25px #00f7ff;
    }

    .badge{
      display:inline-block;
      padding:10px 22px;
      border-radius:999px;
      background:linear-gradient(90deg,#00f7ff,#ff00aa);
      color:#050816;
      font-weight:700;
      margin-bottom:2.5rem;
      font-size:.9rem;
    }

    .pipeline{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:1rem;
    }

    .step{
      padding:1.5rem;
      border-radius:18px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      transition:.35s;
    }

    .step:hover{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 0 25px rgba(0,247,255,.25);
      border-color:#00f7ff;
    }

    .icon{
      font-size:2rem;
      margin-bottom:.8rem;
    }

    .step h3{
      margin-bottom:.5rem;
      font-size:1.1rem;
      color:#00f7ff;
    }

    .step p{
      font-size:.88rem;
      color:#cbd5e1;
      line-height:1.5;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>DevOps Zero To Hero</h1>

    <div class="badge">
      GitHub Actions CI/CD Pipeline
    </div>

    <div class="pipeline">

      <div class="step">
        <div class="icon">⚙️</div>
        <h3>Build</h3>
        <p>Docker image built automatically</p>
      </div>

      <div class="step">
        <div class="icon">🧪</div>
        <h3>Test & Lint</h3>
        <p>Quality checks completed successfully</p>
      </div>

      <div class="step">
        <div class="icon">🚀</div>
        <h3>Deploy</h3>
        <p>Application deployed using GitHub Actions</p>
      </div>

    </div>

  </div>

</body>
</html>
